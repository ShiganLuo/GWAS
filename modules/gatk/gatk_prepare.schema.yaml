Procedure:
    type: object
    properties:
      # 以下工具路径允许为 string 或 null (对应 YAML 中的空值)
      gatk: {type: ["string", "null"]}
      samtools: {type: ["string", "null"]}

outdir:
    type: string
    default: "output"

addReadsGroup:
    type: object
    properties:
        RGLB:
            type: string
            description: "Read group library identifier"
        RGPL:
            type: string
            description: "Read group platform identifier"
        RGPU:
            type: string
            description: "Read group platform unit"

fasta:
    type: string # 参考基因组路径

tmp_dir:
    type: string
    default: "tmp"