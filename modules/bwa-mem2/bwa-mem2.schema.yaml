Procedure:
    type: object
    properties:
      # 以下工具路径允许为 string 或 null (对应 YAML 中的空值)
      bwaMem2: {type: ["string", "null"]}
      samtools: {type: ["string", "null"]}
outdir:
    type: string
    default: "output"
fasta:
    type: string # 参考基因组路径
bwaMem2_index_prefix:
    type: ["string", "null"]

paired_samples:
    type: array
    items:
        type: string
single_samples:
    type: array
    items:
        type: string
